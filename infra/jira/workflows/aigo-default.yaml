schemaVersion: 1
# AIGO is a team-managed (next-gen) Jira project. Team-managed projects use
# a simplified board-based workflow exposed by GET /project/{key}/statuses.
# The three statuses below are the live statuses returned by that API.
# Custom statuses (Intake, Triage, etc.) exist as global Jira statuses but
# are not assigned to this project's workflow scheme.
workflow:
  name: AIGO Default
  type: team-managed
  statuses:
    - name: To Do
      category: TODO
    - name: In Progress
      category: IN_PROGRESS
    - name: Done
      category: DONE
  transitions: []
