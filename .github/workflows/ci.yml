name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check / build (Forge + domain)
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Run integration tests (includes mock Jira API suite)
        run: npm run test:integration

      - name: Validate automation JSON schemas
        run: |
          for f in automation/rules/*.json; do
            echo "Validating $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8')); console.log('OK: $f')"
          done

      - name: Validate rendered automation rules (DISABLED + no placeholders)
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const dir = 'automation/rules/rendered';
          const files = fs.readdirSync(dir).filter(f => f.endsWith('.json'));
          if (files.length === 0) { console.error('No rendered rule files found'); process.exit(1); }
          let failed = false;
          for (const file of files) {
            const raw = fs.readFileSync(path.join(dir, file), 'utf8');
            // Must be valid JSON
            let data;
            try { data = JSON.parse(raw); } catch(e) { console.error('INVALID JSON: ' + file); failed = true; continue; }
            const rules = (data.rules || [data]);
            for (const rule of rules) {
              // Must import as DISABLED
              if (rule.state !== 'DISABLED') {
                console.error('FAIL (not DISABLED): ' + file + ' state=' + rule.state);
                failed = true;
              }
              // Must have no unfilled placeholders
              if (/\{\{[A-Z_]+\}\}/.test(raw)) {
                console.error('FAIL (unfilled placeholder): ' + file);
                failed = true;
              }
              console.log('OK: ' + file + ' (state=DISABLED, no placeholders)');
            }
          }
          if (failed) process.exit(1);
          "

      - name: Render seed (smoke check)
        env:
          AIGO_INSTANCE_CONFIG: instances/aigo.example.json
        run: npm run seed:render

      - name: Validate Jira provision config (dry run)
        run: npm run provision:jira:dry
        env:
          AIGO_INSTANCE_CONFIG: instances/aigo.example.json

      - name: Validate seed config (dry run)
        run: node scripts/provision-seeds.cjs --dry-run --config instances/aigo.example.json

      - name: Validate automation rules (dry run)
        run: node scripts/provision-automation.cjs --dry-run --config instances/aigo.example.json

      - name: Validate dashboards script (dry run)
        run: node scripts/provision-dashboards.cjs --dry-run

      - name: Validate forge-import-automation script (dry run)
        run: node scripts/forge-import-automation.cjs --config instances/aigo.example.json --dry-run
