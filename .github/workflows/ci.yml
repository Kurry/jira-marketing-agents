name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check / build (Forge + domain)
        run: npm run build

      - name: Run unit tests
        run: npm test

      - name: Run integration tests
        run: npm run test:integration

      - name: Validate automation JSON schemas
        run: |
          for f in automation/rules/*.json; do
            echo "Validating $f"
            node -e "JSON.parse(require('fs').readFileSync('$f', 'utf8')); console.log('OK: $f')"
          done

      - name: Render seed (smoke check)
        env:
          AIGO_INSTANCE_CONFIG: instances/aigo.example.json
        run: npm run seed:render

      - name: Validate Jira provision config (dry run)
        run: npm run provision:jira:dry
        env:
          AIGO_INSTANCE_CONFIG: instances/aigo.example.json
